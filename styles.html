<style>
  body {
    background-color: #0d1117; /* Fondo oscuro tipo GitHub Dark */
    color: #c9d1d9;           /* Texto gris claro, evita el blanco puro */
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    line-height: 1.6;
    max-width: 850px;
    margin: 0 auto;
    padding: 2rem;
  }

  /* Títulos con un toque de color de acento */
  h1, h2, h3, h4 {
    color: #58a6ff; 
    border-bottom: 1px solid #30363d;
    padding-bottom: 0.3em;
    margin-top: 24px;
  }

  /* Enlaces */
  a {
    color: #58a6ff;
    text-decoration: none;
  }
  a:hover {
    text-decoration: underline;
  }

  /* Bloques de Código */
  pre {
    background-color: #161b22;
    border: 1px solid #30363d;
    border-radius: 6px;
    padding: 16px;
    overflow: auto;
    color: #e6edf3;
  }

  code {
    background-color: rgba(110, 118, 129, 0.4);
    padding: 0.2em 0.4em;
    border-radius: 6px;
    font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, Consolas, Liberation Mono, monospace;
    font-size: 85%;
  }

  /* Tablas profesionales en modo oscuro */
  table {
    border-collapse: collapse;
    width: 100%;
    margin: 20px 0;
    background-color: #161b22;
  }

  table th {
    background-color: #21262d;
    color: #f0f6fc;
    border: 1px solid #30363d;
    padding: 10px;
    text-align: left;
  }

  table td {
    border: 1px solid #30363d;
    padding: 10px;
  }

  table tr:nth-child(even) {
    background-color: #0d1117;
  }

  /* Citas / Quotes */
  blockquote {
    padding: 0 1em;
    color: #8b949e;
    border-left: 0.25em solid #30363d;
    margin: 0;
  }

  /* Scrollbar personalizada para que no desentone */
  ::-webkit-scrollbar {
    width: 10px;
  }
  ::-webkit-scrollbar-track {
    background: #0d1117;
  }
  ::-webkit-scrollbar-thumb {
    background: #30363d;
    border-radius: 5px;
  }
  ::-webkit-scrollbar-thumb:hover {
    background: #484f58;
  }
</style>
